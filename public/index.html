<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sneaker Shop - Hub de Paiement</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-100 min-h-screen text-gray-800 font-sans">

    <nav class="bg-white shadow-sm sticky top-0 z-40">
        <div class="max-w-6xl mx-auto px-4 py-4 flex justify-between items-center">
            <h1 class="text-xl font-black tracking-wider text-gray-900">SNEAKERS SHOP</h1>
            <button onclick="toggleCart(true)" class="relative bg-gray-100 p-2.5 rounded-full hover:bg-gray-200 transition">
                <i class="fa-solid fa-bag-shopping text-lg"></i>
                <span id="cart-badge" class="absolute -top-1 -right-1 bg-orange-500 text-white text-xs font-bold w-5 h-5 rounded-full flex items-center justify-center hidden">0</span>
            </button>
        </div>
    </nav>

    <main class="max-w-6xl mx-auto px-4 py-8">
        <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
            
            <div class="bg-white rounded-2xl shadow-md overflow-hidden hover:shadow-xl transition duration-300">
                <div class="bg-gray-100 h-64 flex items-center justify-center p-6">
                    <img src="adidas-2023.png" alt="Adidas Forum Low Street" class="max-h-full max-w-full object-contain">
                </div>
                <div class="p-6">
                    <span class="text-xs font-bold uppercase tracking-widest text-gray-400">Adidas</span>
                    <h2 class="text-xl font-bold text-gray-900 mt-1">Forum Low Street</h2>
                    <p class="text-gray-500 mt-2 text-sm">Le style classique revisité pour la culture urbaine moderne.</p>
                    <div class="flex justify-between items-center mt-6">
                        <span class="text-xl font-black text-gray-900">75.00 $</span>
                        <button onclick="addToCart('adidas-forum-2023', 'Forum Low Street', 75.00)" class="bg-gray-900 hover:bg-orange-600 text-white font-bold py-2.5 px-5 rounded-xl transition shadow-md">
                            Ajouter au panier
                        </button>
                    </div>
                </div>
            </div>

            <div class="bg-white rounded-2xl shadow-md overflow-hidden hover:shadow-xl transition duration-300">
                <div class="bg-gray-100 h-64 flex items-center justify-center p-6">
                    <img src="nike-2023.png" alt="Air Max Classic 23" class="max-h-full max-w-full object-contain">
                </div>
                <div class="p-6">
                    <span class="text-xs font-bold uppercase tracking-widest text-gray-400">Nike</span>
                    <h2 class="text-xl font-bold text-gray-900 mt-1">Air Max Classic 23</h2>
                    <p class="text-gray-500 mt-2 text-sm">Amorti légendaire et confort absolu au quotidien.</p>
                    <div class="flex justify-between items-center mt-6">
                        <span class="text-xl font-black text-gray-900">85.00 $</span>
                        <button onclick="addToCart('nike-air-2023', 'Air Max Classic 23', 85.00)" class="bg-gray-900 hover:bg-orange-600 text-white font-bold py-2.5 px-5 rounded-xl transition shadow-md">
                            Ajouter au panier
                        </button>
                    </div>
                </div>
            </div>

        </div>
    </main>

    <div id="cart-sidebar" class="fixed inset-0 z-50 overflow-hidden hidden" aria-labelledby="slide-over-title" role="dialog" aria-modal="true">
        <div class="absolute inset-0 overflow-hidden">
            <div onclick="toggleCart(false)" class="absolute inset-0 bg-gray-500 bg-opacity-75 transition-opacity"></div>

            <div class="pointer-events-none fixed inset-y-0 right-0 flex max-w-full pl-10">
                <div class="pointer-events-auto w-screen max-w-md bg-white shadow-2xl flex flex-col h-full">
                    
                    <div class="px-6 py-5 border-b flex items-center justify-between">
                        <h2 class="text-lg font-bold text-gray-900">Votre Panier</h2>
                        <button onclick="toggleCart(false)" class="text-gray-400 hover:text-gray-500">
                            <i class="fa-solid fa-xmark text-xl"></i>
                        </button>
                    </div>

                    <div class="flex-1 overflow-y-auto px-6 py-4 space-y-4" id="cart-items-container">
                        </div>

                    <div class="border-t p-6 bg-gray-50 space-y-4">
                        <div class="flex justify-between text-base font-bold text-gray-900">
                            <p>Sous-total</p>
                            <p id="cart-total">0.00 $</p>
                        </div>

                        <div class="space-y-2">
                            <p class="text-xs font-bold uppercase tracking-wider text-gray-500">Moyen de paiement</p>
                            <div class="grid grid-cols-1 gap-2 max-h-48 overflow-y-auto pr-1">
                                
                                <label class="flex items-center justify-between p-2.5 bg-white rounded-xl border border-gray-200 cursor-pointer hover:border-emerald-500 transition">
                                    <div class="flex items-center space-x-3">
                                        <span class="w-8 h-8 rounded-lg bg-emerald-100 text-emerald-600 flex items-center justify-center font-black text-xs">MC</span>
                                        <span class="text-sm font-semibold text-gray-800">MaxiCash</span>
                                    </div>
                                    <input type="radio" name="payment-method" value="MaxiCash" checked class="w-4 h-4 text-emerald-600 focus:ring-emerald-500">
                                </label>

                                <label class="flex items-center justify-between p-2.5 bg-white rounded-xl border border-gray-200 cursor-pointer hover:border-red-500 transition">
                                    <div class="flex items-center space-x-3">
                                        <span class="w-8 h-8 rounded-lg bg-red-100 text-red-600 flex items-center justify-center font-black text-xs">MP</span>
                                        <span class="text-sm font-semibold text-gray-800">M-Pesa (Vodacom)</span>
                                    </div>
                                    <input type="radio" name="payment-method" value="M-Pesa" class="w-4 h-4 text-red-600 focus:ring-red-500">
                                </label>

                                <label class="flex items-center justify-between p-2.5 bg-white rounded-xl border border-gray-200 cursor-pointer hover:border-orange-500 transition">
                                    <div class="flex items-center space-x-3">
                                        <span class="w-8 h-8 rounded-lg bg-orange-100 text-orange-600 flex items-center justify-center font-black text-xs">OM</span>
                                        <span class="text-sm font-semibold text-gray-800">Orange Money</span>
                                    </div>
                                    <input type="radio" name="payment-method" value="Orange Money" class="w-4 h-4 text-orange-600 focus:ring-orange-500">
                                </label>

                                <label class="flex items-center justify-between p-2.5 bg-white rounded-xl border border-gray-200 cursor-pointer hover:border-blue-500 transition">
                                    <div class="flex items-center space-x-3">
                                        <span class="w-8 h-8 rounded-lg bg-blue-100 text-blue-600 flex items-center justify-center text-xs"><i class="fa-solid fa-credit-card"></i></span>
                                        <span class="text-sm font-semibold text-gray-800">Carte Visa / Mastercard</span>
                                    </div>
                                    <input type="radio" name="payment-method" value="Carte de Crédit" class="w-4 h-4 text-blue-600 focus:ring-blue-500">
                                </label>

                                <label class="flex items-center justify-between p-2.5 bg-white rounded-xl border border-gray-200 cursor-pointer hover:border-indigo-500 transition">
                                    <div class="flex items-center space-x-3">
                                        <span class="w-8 h-8 rounded-lg bg-indigo-100 text-indigo-600 flex items-center justify-center text-xs"><i class="fa-brands fa-paypal"></i></span>
                                        <span class="text-sm font-semibold text-gray-800">PayPal</span>
                                    </div>
                                    <input type="radio" name="payment-method" value="PayPal" class="w-4 h-4 text-indigo-600 focus:ring-indigo-500">
                                </label>

                            </div>
                        </div>

                        <button id="checkout-btn" onclick="processCheckout()" class="w-full bg-gray-900 hover:bg-black text-white font-bold py-3 px-4 rounded-xl transition text-center block shadow-lg">
                            Continuer
                        </button>
                    </div>

                </div>
            </div>
        </div>
    </div>

    <script src="app.js"></script>
</body>
</html>
