<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Paiement Annulé</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body class="bg-gray-50 h-screen flex items-center justify-center font-sans">

    <div class="max-w-md w-full bg-white p-8 rounded-2xl shadow-xl text-center border border-gray-100">
        <div class="w-16 h-16 bg-red-100 text-red-600 rounded-full flex items-center justify-center mx-auto mb-6 text-2xl">
            <i class="fas fa-exclamation-triangle"></i>
        </div>
        
        <h1 class="text-2xl font-black text-gray-900 mb-2">Paiement Non Finalisé</h1>
        <p class="text-gray-500 text-sm mb-6">La transaction a été annulée ou n'a pas pu aboutir. Aucun montant n'a été débité de votre compte.</p>

        <div class="space-y-3">
            <a href="/index.html" class="inline-block w-full bg-gray-900 hover:bg-black text-white font-bold py-3 px-4 rounded-xl transition text-sm">
                Réessayer le paiement
            </a>
            <a href="/index.html" class="inline-block text-sm font-semibold text-gray-500 hover:text-gray-800 transition">
                Retour à l'accueil
            </a>
        </div>
    </div>

</body>
</html>
